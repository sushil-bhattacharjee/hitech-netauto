services:
  netconf-sender:
    build: .
    container_name: netconf-sender
    image: netconf-sender:latest
    ports:
      - "7071:7071"
    restart: unless-stopped
    # If 192.168.89.71 isn't reachable from the default bridge network
    # (e.g. CML host-only network), switch to host networking:
    #   network_mode: host
    # and remove the `ports:` block above.
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:7071/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
